name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21', '25']
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew clean build --no-daemon -PtestJavaVersion=${{ matrix.java }}
